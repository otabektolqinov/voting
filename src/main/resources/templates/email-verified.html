<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <meta http-equiv="refresh" th:if="${success}" content="3;url=/login">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .icon { font-size: 60px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .redirect-msg { color: #888; font-size: 14px; margin-top: 10px; }
        a { color: #1976D2; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon" th:text="${success} ? '✅' : '❌'"></div>
    <h2 th:class="${success} ? 'success' : 'error'"
        th:text="${success} ? 'Email Verified!' : 'Verification Failed'"></h2>
    <p th:text="${message}"></p>
    <p class="redirect-msg" th:if="${success}">Redirecting to login in 3 seconds...</p>
    <a href="http://45.80.148.215:8080/api/auth/login">Go to Login →</a>
</div>
</body>
</html>
